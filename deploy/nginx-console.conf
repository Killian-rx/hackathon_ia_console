# Reverse-proxy Nginx pour la console d'inférence (même VM que server.py).
#
# Installation :
#   sudo cp deploy/nginx-console.conf /etc/nginx/sites-available/console
#   sudo ln -s /etc/nginx/sites-available/console /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (recommandé) — une fois un domaine pointé sur l'IP publique :
#   sudo certbot --nginx -d console.ton-domaine.fr
#   certbot ajoute automatiquement le bloc TLS et la redirection 80 -> 443.
#
# server.py doit tourner en local : HOST=127.0.0.1 PORT=8080
# (cf. deploy/inference-console.service)

server {
    listen 80;
    listen [::]:80;

    # Remplace par ton domaine. Laisse "_" pour un accès par IP publique.
    server_name console.ton-domaine.fr;

    # Taille des prompts envoyés.
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- Indispensable pour le streaming token-par-token du modèle ---
        # Sans ça, Nginx bufferise et la réponse n'apparaît qu'à la fin.
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
    }
}
